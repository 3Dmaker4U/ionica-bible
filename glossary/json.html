<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JSON Syntax Highlighter</title>
    <style>
        body { background-color: #121212; font-family: 'Consolas', monospace; padding: 30px; }
        .code-container {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #333;
            line-height: 1.5;
            color: #d4d4d4;
            white-space: pre-wrap; /* Maintains spacing/newlines */
        }
        /* Syntax Colors */
        .json-key    { color: #9cdcfe; } /* Light Blue */
        .json-string { color: #ce9178; } /* Orange/Brown */
        .json-number { color: #b5cea8; } /* Light Green */
        .json-boolean{ color: #569cd6; } /* Darker Blue */
        .json-null   { color: #569cd6; }
    </style>
</head>
<body>

    <div id="viewport" class="code-container">Loading JSON...</div>

    <script>
        // A simple regex-based syntax highlighter
        function syntaxHighlight(json) {
            if (typeof json !== 'string') {
                json = JSON.stringify(json, null, 4);
            }
            // Escape HTML characters
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // Regex to find keys, strings, numbers, booleans
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return `<span class="${cls}">${match}</span>`;
            });
        }

        async function loadData() {
            const viewport = document.getElementById('viewport');
            try {
                const response = await fetch('nonel-dressed.json');
                if (!response.ok) throw new Error("HTTP error " + response.status);
                
                const data = await response.json();
                
                // Inject the highlighted HTML
                viewport.innerHTML = syntaxHighlight(data);
                
            } catch (err) {
                viewport.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
            }
        }

        loadData();
    </script>
</body>
</html>
